name: Import project

on:
  push:
    paths:
      - '.project-import/**'

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore project files
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d .project-import ]; then
            echo "Import chunks already removed."
            exit 0
          fi
          cat \
            .project-import/chunk-00 \
            .project-import/chunk-01 \
            .project-import/chunk-02 \
            .project-import/chunk-03 \
            .project-import/chunk-04a \
            .project-import/chunk-04b \
            .project-import/chunk-04c \
            .project-import/chunk-04d \
            .project-import/chunk-04e \
            .project-import/chunk-04f \
            > /tmp/hesaplas-source.tar.gz
          find . -mindepth 1 -maxdepth 1 \
            ! -name .git \
            ! -name .github \
            ! -name .project-import \
            -exec rm -rf {} +
          tar -xzf /tmp/hesaplas-source.tar.gz -C .
          rm -rf .project-import
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Hesaplas.com v4.4 kaynak dosyalarını aktar"
          git push
