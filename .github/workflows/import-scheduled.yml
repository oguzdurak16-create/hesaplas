name: Finalize source import

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    if: github.repository == 'oguzdurak16-create/hesaplas'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore full project tree
        shell: bash
        run: |
          set -euo pipefail
          test -d .project-import || { echo 'Source already restored.'; exit 0; }
          cat \
            .project-import/chunk-00 \
            .project-import/chunk-01 \
            .project-import/chunk-02 \
            .project-import/chunk-03 \
            .project-import/chunk-04a \
            .project-import/chunk-04b \
            .project-import/chunk-04c \
            .project-import/chunk-04d \
            .project-import/chunk-04e \
            .project-import/chunk-04f \
            > /tmp/hesaplas-source.tar.gz
          find . -mindepth 1 -maxdepth 1 \
            ! -name .git \
            ! -name .github \
            ! -name .project-import \
            -exec rm -rf {} +
          tar -xzf /tmp/hesaplas-source.tar.gz -C .
          rm -rf .project-import
          rm -f .github/workflows/import-project.yml
          rm -f .github/workflows/import-scheduled.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Hesaplas.com v4.4 kaynak dosyalarını aktar'
          git push origin HEAD:main
